<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Better for You</title>
    <style>
      html, body {
        margin: 0; height: 100%;
        background: #ffffff; color: #000000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        display: flex; align-items: center; justify-content: center;
      }
      .wrap { text-align: center; }
      .mark { width: 64px; height: 64px; }
      p { margin-top: 16px; font-size: 13px; letter-spacing: .04em; color: #555; }
    </style>
  </head>
  <body>
    <!-- Fallback shell. In normal operation Capacitor's server.url loads the live
         site immediately; this only shows if the remote URL is unreachable. -->
    <div class="wrap">
      <svg class="mark" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" fill="#000" />
        <path d="M14 34 L26 46 L50 22" stroke="#fff" stroke-width="6"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
      <p>Better for You — connecting&hellip;</p>
    </div>
  </body>
</html>
